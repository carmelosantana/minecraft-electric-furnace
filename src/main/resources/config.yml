# ElectricFurnace configuration
#
# Balance ceiling (enforced in code, not just documented here): alloy stats must
# sit between iron and diamond, and must never exceed netherite. Any alloy stat
# configured above the netherite reference is clamped down to the diamond
# reference automatically, and a warning is logged naming the alloy, the stat,
# the configured value, and the clamp.
#
# Every key below is validated on load. An out-of-range or unparseable value logs
# a warning naming the key, the offending value, and the default it was replaced
# with -- a typo in this file degrades gracefully to defaults, it never stops the
# plugin from starting.
#
# Known limitation, not a config toggle: hoppers (and droppers/dispensers) cannot
# feed an Electric Furnace, or pull from one, in either direction. The underlying
# BLAST_FURNACE block still has its own vanilla 3-slot smelting inventory, entirely
# separate from this plugin's custom GUI and persisted machine state; items a
# hopper pushed into it would sit invisible and unreachable, never displayed and
# never saved. Every such transfer is cancelled outright. Feed a machine through
# its GUI.

machine:
  # Multiplier applied to the vanilla 200-tick smelt duration. 2.5 means one item
  # smelts in 80 ticks (4 seconds). Valid range: 1.0-10.0.
  smelt-speed-multiplier: 2.5
  # Ticks of burn time bought by one redstone dust. Burn time is spent only while a
  # smelt is actively advancing -- a powered machine with nothing to do does not eat
  # your dust. At the defaults, one dust smelts 2.5 items. Valid range: 20-6000.
  burn-ticks-per-redstone: 200
  # Whether the machine requires a redstone signal to run at all. The signal is the
  # on/off switch; redstone dust is the fuel. See status-bulb below.
  require-redstone-signal: true
  status-bulb:
    # Whether an adjacent COPPER_BULB is driven (via CopperBulb#setLit) to reflect
    # the machine's current power/fuel state.
    enabled: true

effects:
  # Master switch for the particle/sound loop.
  enabled: true
  # How often, in ticks, the single global effects task runs. One task serves the
  # whole server -- there is no per-block scheduled task. Valid range: 10-40.
  period-ticks: 15
  # Only players within this many blocks of a running machine receive its effects.
  # Valid range: 8-128.
  player-radius: 32
  # Sound played each effect tick, resolved by name against the Sound registry.
  # An unresolvable name disables sound only; particles keep playing regardless.
  sound: BLOCK_BEACON_AMBIENT

recycling:
  # Number of recycler input slots. Valid range: 1-9.
  slots: 5
  # Ingots yielded when all inputs are the same metal, with no modifier (e.g. coal)
  # present. Valid range: 0-64.
  yield-same-metal: 3
  # Alloy ingots yielded for a mixed-metal input -- whether it matches a named
  # recipe below or falls back to the generic Fused Alloy. Valid range: 0-64.
  yield-mixed-alloy: 2
  # Ingots yielded per alloy item remelted -- an all-alloy input of N items sharing
  # one alloy id yields N times this. This is the only recipe that accepts fewer
  # than `slots` items. Valid range: 0-64.
  yield-remelt-alloy: 1
  # Whether damaged (partially worn) gear is accepted at full yield. Durability is
  # never scaled into the yield -- giving worn-out gear a worthwhile destination
  # is a primary purpose of this plugin.
  accept-damaged: true

# Alloy recipes, parsed by AlloyRegistry#load (Task 2). Each entry names the
# distinct inputs (metals and/or the coal modifier) required to produce that
# alloy, in any order/quantity as long as every listed input is present.
# `fused_alloy` is the generic fallback for any mixed-metal combination that
# matches nothing else -- it is identified by its empty `inputs` list, not by
# its id, so renaming it is safe as long as exactly one recipe has empty inputs.
#
# `stats` is the full stat block (attack damage, attack speed, armor, armor
# toughness, max durability, enchantability). Per the balance ceiling above, no
# stat may exceed the netherite reference; out-of-range stats are clamped to the
# diamond reference and logged. This clamp runs unconditionally in code -- there
# is no switch here to disable it.
alloys:
  steel:
    display-name: "Steel"
    color: "#71797E"
    lore:
      - "A carbon-hardened iron alloy."
      - "Stronger than iron, cheaper than netherite."
    inputs: [iron, coal]
    stats:
      attack-damage: 6.5
      attack-speed: -2.6
      armor: 16
      armor-toughness: 1.0
      max-durability: 700
      enchantability: 12
  rose_gold:
    display-name: "Rose Gold"
    color: "#B76E79"
    lore:
      - "A warm copper-gold blend."
    inputs: [copper, gold]
    stats:
      attack-damage: 6.2
      attack-speed: -2.5
      armor: 15
      armor-toughness: 0.5
      max-durability: 500
      enchantability: 20
  ferrocopper:
    display-name: "Ferrocopper"
    color: "#B87333"
    lore:
      - "Copper toughened with iron."
    inputs: [copper, iron]
    stats:
      attack-damage: 6.3
      attack-speed: -2.5
      armor: 16
      armor-toughness: 1.0
      max-durability: 600
      enchantability: 14
  electrum_steel:
    display-name: "Electrum Steel"
    color: "#D4C9A8"
    lore:
      - "Gold-veined structural steel."
    inputs: [gold, iron]
    stats:
      attack-damage: 6.8
      attack-speed: -2.4
      armor: 18
      armor-toughness: 1.5
      max-durability: 900
      enchantability: 16
  fused_alloy:
    display-name: "Fused Alloy"
    color: "#4B4B4B"
    lore:
      - "An unrefined fusion of leftover metals."
    # Fallback: matches any mixed-metal combination not covered by a named recipe
    # above (or 3+ distinct metals). Intentionally has no fixed input list.
    inputs: []
    stats:
      attack-damage: 6.0
      attack-speed: -2.6
      armor: 15
      armor-toughness: 0.5
      max-durability: 400
      enchantability: 10
